name: Keep Streamlit Alive via Virtual Visitor

on:
  schedule:
    # 每 6 小時派一個隱形瀏覽器去開啟網頁，完美維持開機
    - cron: '0 */6 * * *'
  workflow_dispatch: # 允許手動點擊測試

jobs:
  wake_up:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Google Chrome Engine (Playwright)
        run: |
          pip install playwright
          playwright install chromium
          
      - name: Simulate Human Visiting Webpage
        run: |
          python << EOF
          from playwright.sync_api import sync_playwright
          import time
          
          url = 'https://conferencesystem1-fmwepjtajgmyue6vftrbga.streamlit.app/'
          print(f"🚀 [啟動] 正在派遣隱形瀏覽器前往：{url}")
          
          try:
              with sync_playwright() as p:
                  # 啟動隱形的 Chrome 瀏覽器
                  browser = p.chromium.launch(headless=True)
                  page = browser.new_page()
                  
                  # 模擬真實視窗大小與人類行為
                  page.set_viewport_size({"width": 1280, "height": 800})
                  
                  # 正式開網頁，給它 60 秒的時間甦醒
                  page.goto(url, timeout=60000)
                  print("✨ [成功] 網頁已順利開啟！")
                  
                  # 停留 10 秒，讓 Streamlit 內部的連線機制（WebSocket）完全建立完畢
                  print("⏳ 停留 10 秒建立連線機制，維持伺服器熱度...")
                  time.sleep(10)
                  
                  print("🔒 [完工] 連線確認完畢，關閉隱形瀏覽器。")
                  browser.close()
          except Exception as e:
              print(f"❌ [錯誤] 這次點擊遇到問題: {e}")
          EOF
